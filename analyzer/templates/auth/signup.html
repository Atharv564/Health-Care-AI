<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup | Healthcare Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-tr from-indigo-900 via-blue-900 to-slate-900 flex items-center justify-center px-4">

    <!-- Card -->
    <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl p-8">

        <!-- Title -->
        <div class="text-center mb-6">
            <h2 class="text-3xl font-extrabold text-white">Create Account</h2>
            <p class="text-gray-300 text-sm mt-2">
                Start using AI-powered healthcare analytics
            </p>
        </div>

        <!-- Error Messages -->
        {% for message in messages %}
        <div class="mb-4 p-3 bg-red-500/20 text-red-200 rounded-lg text-sm">
            {{ message }}
        </div>
        {% endfor %}

        <!-- Form -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="text-gray-300 text-sm">Username</label>
                <input type="text" name="username" required
                    class="w-full mt-1 px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:border-blue-400">
            </div>

            <!-- Password -->
            <div>
                <label class="text-gray-300 text-sm">Password</label>
                <input type="password" name="password" required
                    class="w-full mt-1 px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:border-blue-400">
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full py-2 rounded-lg bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-semibold hover:opacity-90 transition">
                Signup
            </button>
        </form>

        <!-- Footer -->
        <p class="text-center text-sm text-gray-400 mt-6">
            Already have an account?
            <a href="/login/" class="text-blue-400 hover:underline">Login</a>
        </p>

    </div>

</body>
</html>
