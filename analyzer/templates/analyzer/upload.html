<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthcare Analytics | Upload Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-tr from-indigo-900 via-blue-900 to-slate-900 flex items-center justify-center px-4">

    <!-- Top Right Nav (Improved) -->
    <div class="absolute top-5 right-5 flex items-center gap-3">

        <!-- History Button -->
        <a href="/history/"
           class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/10 border border-white/20 backdrop-blur-md text-gray-200 text-sm hover:bg-blue-500/20 hover:border-blue-400 transition">

            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-400" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4l3 3M12 6v2m0 8v2m6-6h2M4 12H2" />
            </svg>

            <span>History</span>
        </a>

        <!-- Logout Button -->
        <button onclick="confirmLogout()"
            class="flex items-center gap-2 px-4 py-2 rounded-xl bg-red-500/20 border border-red-400/30 text-red-300 text-sm hover:bg-red-500/40 transition">

            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M17 16l4-4m0 0l-4-4m4 4H7" />
            </svg>

            <span>Logout</span>
        </button>

    </div>

    <!-- Main Card -->
    <div class="relative w-full max-w-lg bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl p-8">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">
                Healthcare Analytics
            </h1>
            <p class="text-gray-300 mt-2 text-sm">
                Upload patient data & generate AI-powered insights
            </p>
        </div>

        <!-- ERROR DISPLAY -->
        {% if error %}
        <div class="mb-4 p-3 bg-red-500/20 text-red-200 rounded-lg text-sm">
            {{ error }}
        </div>
        {% endif %}

        <!-- Upload Form -->
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <!-- Hidden Input -->
            <input type="file" name="csv_file" id="fileInput" class="hidden" required>

            <!-- Upload Box -->
            <label for="fileInput" class="block">
                <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-400/40 rounded-xl p-6 cursor-pointer hover:border-blue-400 transition">

                    <!-- Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-400 mb-3" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" />
                    </svg>

                    <p class="text-gray-200 font-medium">
                        Click to upload CSV file
                    </p>

                    <p id="fileName" class="text-xs text-green-300 mt-2"></p>

                    <p class="text-xs text-gray-400 mt-1">
                        Max 5MB
                    </p>

                </div>
            </label>

            <!-- Submit -->
            <button type="submit"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-semibold tracking-wide hover:opacity-90 transition">
                Analyze Healthcare Data
            </button>
        </form>

        <!-- Features -->
        <div class="mt-6 grid grid-cols-3 gap-4 text-center text-xs text-gray-300">
            <div>📊 <br> Metrics</div>
            <div>🤖 <br> AI Insights</div>
            <div>⚡ <br> Fast</div>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">
            Supported format: <span class="text-white font-medium">CSV</span>
        </p>

    </div>

    <!-- JS -->
    <script>
        const fileInput = document.getElementById("fileInput");
        const fileName = document.getElementById("fileName");

        fileInput.addEventListener("change", function () {
            if (fileInput.files.length > 0) {
                fileName.textContent = "Selected: " + fileInput.files[0].name;
            }
        });

        function confirmLogout() {
            if (confirm("Are you sure you want to logout?")) {
                window.location.href = "/logout/";
            }
        }
    </script>

</body>
</html>
